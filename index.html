<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluent · Zero to Native English</title>
    <meta
      name="description"
      content="A self-study path from zero English to native-level fluency. CEFR-mapped grammar lessons, frequency vocabulary, pronunciation drills, interactive exercises, and spaced-repetition review."
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#eae6da" />

    <!-- Paint the themed background immediately, before CSS or React load. -->
    <style>
      html {
        background: #eae6da;
      }
      html[data-theme='dark'] {
        background: #10140e;
      }
    </style>
    <!-- Apply the saved theme synchronously so a refresh never flashes the wrong mode. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('fluent');
          var s = raw ? JSON.parse(raw).state : null;
          var theme = s && s.theme === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', theme === 'dark' ? '#10140e' : '#eae6da');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
